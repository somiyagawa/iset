<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0e13"/>
      <stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <linearGradient id="ank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5cf2ff"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#00e5ff" stroke-opacity="0.22" stroke-width="1"/>

  <!-- tech corner accents -->
  <g stroke="#00e5ff" stroke-width="2" stroke-linecap="square" opacity="0.85">
    <path d="M8 14 V8 H14" fill="none"/>
    <path d="M56 14 V8 H50" fill="none"/>
    <path d="M8 50 V56 H14" fill="none"/>
    <path d="M56 50 V56 H50" fill="none"/>
  </g>

  <!-- ankh -->
  <g filter="url(#glow)">
    <ellipse cx="32" cy="22" rx="8.5" ry="10.5" fill="none" stroke="url(#ank)" stroke-width="5"/>
    <rect x="29.4" y="31" width="5.2" height="23" rx="2.4" fill="url(#ank)"/>
    <rect x="19" y="34.4" width="26" height="5.2" rx="2.4" fill="url(#ank)"/>
  </g>

  <!-- amber accent node -->
  <circle cx="32" cy="22" r="2.1" fill="#e5a23a"/>
</svg>
